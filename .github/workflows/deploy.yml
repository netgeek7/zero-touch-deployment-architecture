name: Deploy to aws instance

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
        - name: code check
          uses: actions/checkout@v6

        - name: ssh deployment to aws instance
          uses: appleboy/ssh-action@v1
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              if [ ! -d ~/zero-touch-deployment-architecture ]
              then
                  git clone https://github.com/netgeek7/zero-touch-deployment-architecture.git
              fi
              cd ~/zero-touch-deployment-architecture
              git pull origin main
              docker compose up --detach --build
